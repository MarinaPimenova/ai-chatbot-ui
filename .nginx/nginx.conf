events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # Timeouts: require 3 minutes
    keepalive_timeout 180s;
    send_timeout 180s;
    client_header_timeout 120s;
    client_body_timeout 120s;

    # Structured access logging (to stdout) for Kubernetes log collection.
    # Note: upstream timings will be "-" for pure static serving.
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        'rt=$request_time urt=$upstream_response_time '
                        'ua="$http_user_agent" '
                        'host="$host" '
                        'rid="$http_x_request_id"';

    access_log /dev/stdout main_ext;
    error_log  /dev/stderr warn;

    # Load per-server configs
    include /etc/nginx/conf.d/*.conf;
}
