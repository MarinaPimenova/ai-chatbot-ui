server {
        server_tokens off;
        listen 80;

        root /usr/share/nginx/html/;
        index index.html;

        # Serve the React app for /ai-chatbot-ui/
        location /ai-chatbot-ui/ {
            alias /usr/share/nginx/html/ai-chatbot-ui/;
            try_files $uri $uri/ /ai-chatbot-ui/index.html;
        }

        # Enable gzip compression
        gzip            on;
        gzip_vary       on;
        gzip_http_version 1.0;
        gzip_comp_level 5;
        gzip_types
                        application/javascript
                        application/json
                        text/css
                        text/plain
                        text/xml
                        image/svg+xml;
        gzip_proxied    no-cache no-store private expired auth;
        gzip_min_length 256;

        # Handle 404 errors by serving the index.html page
        error_page 404 /error.html;
